		<script>
			var count=0;
			var rnd = parseInt(Math.random()*101);
			console.log(rnd);
			function isNum(){
				var num1=Number(document.getElementById("dd1").value);
				if(rnd==num1){
					aq.innerHTML='相等';
				}else if(rnd>num1){
					aq.innerHTML='小了';
				}else {
					aq.innerHTML='大了';
				}
				count++;
				bb.innerHTML=count;
			}

		</script>
